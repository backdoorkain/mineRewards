<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acertijo KattyCraft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2a2a35;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ffbc42; margin-bottom: 10px; }
        p { color: #ccc; font-size: 1.1em; line-height: 1.5; }
        .acertijo-box {
            background: #1e1e24;
            padding: 15px;
            border-left: 5px solid #ffbc42;
            border-radius: 4px;
            margin: 20px 0;
            font-style: italic;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 5px;
            background: #1e1e24;
            color: #fff;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffbc42;
            border: none;
            border-radius: 5px;
            color: #1e1e24;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #e0a334; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧩 El Desafío del Servidor</h1>
    <p>Resuelve el misterio para obtener las coordenadas del tesoro oculto.</p>
    
    <!-- AQUÍ ESCRIBES EL TEXTO DE TU ACERTIJO -->
    <div class="acertijo-box">
        "Tengo ojos pero no veo, bailo sin música y soy el meme más famoso del servidor... ¿Quién soy?"
    </div>

    <form action="/verificar" method="POST">
        <input type="text" name="nick" placeholder="Tu Nick de Minecraft (Exacto)" required>
        <input type="text" name="respuesta" placeholder="Tu Respuesta aquí" required>
        <button type="submit">Enviar Solución</button>
    </form>
</div>

</body>
</html>
